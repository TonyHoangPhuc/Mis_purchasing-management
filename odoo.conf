[options]
addons_path = /usr/lib/python3/dist-packages/odoo/addons
#/mnt/extra-addons
admin_passwd = admin

# ; ================= DATABASE (AIVEN) =================
# db_host = ${DB_HOST}
# db_port = ${DB_PORT}
# db_user = ${DB_USER}
# db_password = ${DB_PASSWORD}
# db_name = ${DB_NAME}
# db_sslmode = require

db_maxconn = 20
list_db = True
dbfilter = .*

; ================= WEB =================
proxy_mode = True
web.base.url = https://mis-purchasing-management.onrender.com

; ================= PERFORMANCE =================
workers = 1
max_cron_threads = 1

; ================= LOG & DATA =================
data_dir = /tmp/odoo
log_level = info

; ================= OTHER =================
server_wide_modules = base,web